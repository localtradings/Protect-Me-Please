name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: node dist/cli/index.js doctor
      - run: node dist/cli/index.js ci
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('reports/final-report.sarif') != ''
        with:
          sarif_file: reports/final-report.sarif
